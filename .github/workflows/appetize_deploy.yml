name: Deploy to Appetize
on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x' # Matches your current version

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug # Debug builds are faster for testing

      - name: Upload to Appetize
        run: |
          curl https://${{ secrets.APPETIZE_TOKEN }}@api.appetize.io/v1/apps \
            -F "file=@build/app/outputs/flutter-apk/app-debug.apk" \
            -F "platform=android"
