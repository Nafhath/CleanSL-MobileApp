name: Deploy to Appetize
on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Updated to v4 for Node 24 compatibility

      - name: Setup Java
        uses: actions/setup-java@v4 # Updated to v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Create .env file
        run: |
          touch .env
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
          echo "GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}" >> .env
          echo "API_BASE_URL=${{ secrets.API_BASE_URL }}" >> .env

      - name: Build APK
        run: flutter build apk --debug

      - name: Upload to Appetize
        run: |
          curl https://${{ secrets.APPETIZE_TOKEN }}@api.appetize.io/v1/apps \
            -F "file=@build/app/outputs/flutter-apk/app-debug.apk" \
            -F "platform=android"
